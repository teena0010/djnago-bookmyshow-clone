{% extends "users/basic.html" %}

{% block content %}
<div class="container text-center py-5 d-flex justify-content-center">
    <div class="card shadow p-5" style="max-width: 600px; width: 100%; border-top: 5px solid #dc3545;">
        <div class="mb-4">
            <span style="font-size: 4rem; color: #dc3545;">❌</span>
        </div>
        <h1 class="text-danger mb-3">Payment Failed or Cancelled</h1>
        <p class="lead">We couldn't complete your transaction.</p>
        <p class="text-muted">No money was deducted from your account. If you believe this is an error, please try another payment method.</p>
        
        <div class="mt-4">
            <a href="/" class="btn btn-outline-primary px-4 py-2">Return Home</a>
        </div>
    </div>
</div>
{% endblock %}
