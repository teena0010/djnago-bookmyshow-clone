{% extends "users/basic.html" %}

{% block content %}
<div class="container py-5 d-flex justify-content-center">
    <div class="card shadow p-4 text-center" style="max-width: 500px; width: 100%;">
        <h2 class="mb-4">Complete Your Booking</h2>
        
        <h4 class="text-primary">{{ order.movie.name }}</h4>
        <p class="text-muted mb-1"><strong>Seats:</strong> {{ order.seat_numbers }}</p>
        <h3 class="my-3">Total: ₹{{ order.total_price }}</h3>

        <!-- We use a custom form that our JavaScript will submit after successful payment -->
        <form action="{{ callback_url }}" method="POST" class="mt-4" id="razorpay-form">
            <!-- Hidden inputs to hold the success tokens -->
            <input type="hidden" name="razorpay_payment_id" id="razorpay_payment_id">
            <input type="hidden" name="razorpay_order_id" id="razorpay_order_id">
            <input type="hidden" name="razorpay_signature" id="razorpay_signature">
            
            <button type="button" id="rzp-button1" class="razorpay-payment-button">Pay with Razorpay</button>
        </form>
    </div>
</div>

<!-- Razorpay Official SDK -->
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script>
    // Configure the popup with data from Django
    var options = {
        "key": "{{ razorpay_merchant_key }}", 
        "amount": "{{ razorpay_amount }}",
        "currency": "{{ currency }}",
        "name": "BookMyShow Clone",
        "description": "Ticket Booking",
        "image": "https://cdn.razorpay.com/logos/GhRQcyean79PqE_medium.png",
        "order_id": "{{ razorpay_order_id }}",
        "handler": function (response){
            // This runs ONLY when payment is successful.
            // We put the tokens into the hidden form and submit it to Django.
            document.getElementById('razorpay_payment_id').value = response.razorpay_payment_id;
            document.getElementById('razorpay_order_id').value = response.razorpay_order_id;
            document.getElementById('razorpay_signature').value = response.razorpay_signature;
            document.getElementById('razorpay-form').submit();
        },
        "prefill": {
            "name": "{{ request.user.username }}",
            "email": "{{ request.user.email }}"
        },
        "theme": {
            "color": "#007bff"
        }
    };

    // Attach click event to the button
    document.getElementById('rzp-button1').onclick = function(e){
        // DEBUG CHECK: Ensure we actually received the keys from Django
        if (!options.key || options.key === 'None' || options.key === '') {
            alert("ERROR: Razorpay Key ID is missing! Check your settings.py");
            return;
        }
        if (!options.order_id || options.order_id === 'None' || options.order_id === '') {
            alert("ERROR: Razorpay Order ID was not generated! Check your views.py");
            return;
        }

        // Initialize and open the popup
        var rzp1 = new Razorpay(options);
        rzp1.on('payment.failed', function (response){
            alert("Payment Failed: " + response.error.description);
        });
        rzp1.open();
        e.preventDefault();
    }
</script>

<style>
    .razorpay-payment-button {
        background-color: #007bff;
        color: white;
        border: none;
        padding: 10px 30px;
        font-size: 1.1rem;
        border-radius: 5px;
        cursor: pointer;
        transition: background-color 0.3s;
        width: 100%;
        font-weight: bold;
    }
    .razorpay-payment-button:hover {
        background-color: #0056b3;
    }
</style>
{% endblock %}
